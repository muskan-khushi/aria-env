name: "aria-compliance-v1"  
version: "1.0.0"
url: "https://muskankhushi-aria-compliance-v1.hf.space"
entry_point: "aria.environment:ARIAEnv"
description: >
  A high-fidelity RL environment for multi-framework compliance auditing. 
  Features evidence-chain validation, cross-framework conflict detection, 
  and live incident response simulation.
author: "Muskan"
license: "MIT"
tags:
  - compliance
  - legal-ai
  - gdpr
  - incident-response
  - openenv

environment:
  type: "text"
  observation_type: "structured"
  action_type: "structured"
  reward_type: "dense"
  episode_type: "finite"

tasks:
  - id: "easy"
    name: "Basic GDPR Audit"
    difficulty: "easy"
    max_steps: 25
  - id: "medium"
    name: "Cross-Framework Review"
    difficulty: "medium"
    max_steps: 30
  - id: "hard"
    name: "Multi-Framework Resolution"
    difficulty: "hard"
    max_steps: 45
  - id: "expert"
    name: "Incident Response Suite"
    difficulty: "expert"
    max_steps: 60

endpoints:
  reset: "/reset"
  step: "/step"
  state: "/state"
  tasks: "/tasks"
  grader: "/grader"
  close: "/health"

baseline:
  model: "Qwen/Qwen2.5-7B-Instruct"
  reproducible: true
  seed: 42
  expected_scores:
    easy: 0.63
    medium: 0.45
    hard: 0.43
    expert: 0.35